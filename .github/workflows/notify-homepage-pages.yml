name: Notify Homepage Pages Build

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger homepage deploy
        env:
          TOKEN: ${{ secrets.PAGES_TRIGGER_TOKEN }}
        run: |
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token ${TOKEN}" \
            https://api.github.com/repos/xxcpeter/xxcpeter.github.io/dispatches \
            -d '{"event_type":"blog-updated","client_payload":{"source_repo":"xxcpeter.blog","sha":"'"${GITHUB_SHA}"'"}}'
